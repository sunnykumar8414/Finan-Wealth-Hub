kind = "web"
previewPath = "/"
title = "FINAN — Finance Dashboard"
version = "1.0.0"
id = "artifacts/finan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24115

[services.development]
run = "pnpm --filter @workspace/finan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finan", "run", "build" ]
publicDir = "artifacts/finan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24115"
BASE_PATH = "/"
